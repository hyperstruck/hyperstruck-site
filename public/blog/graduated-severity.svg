<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F5F3EF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="500" letter-spacing="2">PENALTY MATCHES THE EVIDENCE</text>

  <!-- Row 1: Mild -->
  <rect x="40" y="56" width="640" height="56" rx="8" fill="#FFFFFF" stroke="#E4E2DD" stroke-width="1"/>
  <rect x="40" y="56" width="6" height="56" rx="3" fill="#A1A1AA"/>
  <text x="68" y="78" fill="#52525B" font-size="13" font-weight="600">Task still succeeded</text>
  <text x="68" y="98" fill="#A1A1AA" font-size="12">The learning was suboptimal but not wrong. Gentle correction.</text>
  <rect x="560" y="72" width="100" height="24" rx="12" fill="#F5F5F4" stroke="#E4E2DD" stroke-width="1"/>
  <text x="610" y="88" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="500">mild</text>

  <!-- Row 2: Aggressive -->
  <rect x="40" y="126" width="640" height="56" rx="8" fill="#FFFFFF" stroke="#E4E2DD" stroke-width="1"/>
  <rect x="40" y="126" width="6" height="56" rx="3" fill="#F59E0B"/>
  <text x="68" y="148" fill="#52525B" font-size="13" font-weight="600">Step failed</text>
  <text x="68" y="168" fill="#A1A1AA" font-size="12">The learning caused a specific failure. Aggressive correction.</text>
  <rect x="560" y="142" width="100" height="24" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="610" y="158" text-anchor="middle" fill="#D97706" font-size="11" font-weight="500">aggressive</text>

  <!-- Row 3: Immediate -->
  <rect x="40" y="196" width="640" height="56" rx="8" fill="#FFFFFF" stroke="#E4E2DD" stroke-width="1"/>
  <rect x="40" y="196" width="6" height="56" rx="3" fill="#EF4444"/>
  <text x="68" y="218" fill="#52525B" font-size="13" font-weight="600">Plan failed</text>
  <text x="68" y="238" fill="#A1A1AA" font-size="12">The learning sank the entire workflow. Immediate suppression.</text>
  <rect x="560" y="212" width="100" height="24" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="610" y="228" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="500">immediate</text>
</svg>
