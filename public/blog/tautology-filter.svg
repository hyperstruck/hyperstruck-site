<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F5F3EF"/>
    </linearGradient>
    <linearGradient id="tealLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2BA89E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2BA89E"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="tealFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2BA89E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2BA89E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="redFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="500" letter-spacing="2" font-family="'Space Grotesk', sans-serif">LEARNING QUALITY COMPOUNDS</text>

  <!-- Chart area: x=100..660, y=60..310 -->

  <!-- Y-axis -->
  <line x1="100" y1="60" x2="100" y2="310" stroke="#D1CEC7" stroke-width="1"/>
  <text x="56" y="190" text-anchor="middle" fill="#A1A1AA" font-size="10" font-weight="500" transform="rotate(-90, 56, 190)">Retrieval quality</text>

  <!-- Y-axis ticks -->
  <line x1="95" y1="85" x2="100" y2="85" stroke="#D1CEC7" stroke-width="1"/>
  <text x="88" y="89" text-anchor="end" fill="#A1A1AA" font-size="9">high</text>
  <line x1="95" y1="185" x2="100" y2="185" stroke="#D1CEC7" stroke-width="1"/>
  <line x1="95" y1="285" x2="100" y2="285" stroke="#D1CEC7" stroke-width="1"/>
  <text x="88" y="289" text-anchor="end" fill="#A1A1AA" font-size="9">low</text>

  <!-- X-axis -->
  <line x1="100" y1="310" x2="660" y2="310" stroke="#D1CEC7" stroke-width="1"/>
  <text x="380" y="340" text-anchor="middle" fill="#A1A1AA" font-size="10" font-weight="500">Tasks completed</text>

  <!-- X-axis ticks -->
  <line x1="100" y1="310" x2="100" y2="315" stroke="#D1CEC7" stroke-width="1"/>
  <text x="100" y="328" text-anchor="middle" fill="#A1A1AA" font-size="9">1</text>
  <line x1="240" y1="310" x2="240" y2="315" stroke="#D1CEC7" stroke-width="1"/>
  <text x="240" y="328" text-anchor="middle" fill="#A1A1AA" font-size="9">10</text>
  <line x1="380" y1="310" x2="380" y2="315" stroke="#D1CEC7" stroke-width="1"/>
  <text x="380" y="328" text-anchor="middle" fill="#A1A1AA" font-size="9">25</text>
  <line x1="520" y1="310" x2="520" y2="315" stroke="#D1CEC7" stroke-width="1"/>
  <text x="520" y="328" text-anchor="middle" fill="#A1A1AA" font-size="9">50</text>
  <line x1="660" y1="310" x2="660" y2="315" stroke="#D1CEC7" stroke-width="1"/>
  <text x="660" y="328" text-anchor="middle" fill="#A1A1AA" font-size="9">100</text>

  <!-- Grid lines -->
  <line x1="100" y1="185" x2="660" y2="185" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="240" y1="60" x2="240" y2="310" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="380" y1="60" x2="380" y2="310" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="520" y1="60" x2="520" y2="310" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Starting point (both curves begin near the same place) -->
  <!-- With filtering: rises from ~185 to ~85 with a nice curve -->
  <!-- Without filtering: drops from ~185 to ~275 with a curve -->

  <!-- Shaded area under "with filtering" curve -->
  <path d="M100,195 C170,190 220,165 280,145 C340,125 430,100 520,90 C570,86 620,83 660,80 L660,310 L100,310 Z" fill="url(#tealFill)"/>

  <!-- Shaded area under "without filtering" curve -->
  <path d="M100,195 C170,200 220,218 280,235 C340,252 430,268 520,278 C570,282 620,285 660,287 L660,310 L100,310 Z" fill="url(#redFill)"/>

  <!-- "With filtering" curve -->
  <path d="M100,195 C170,190 220,165 280,145 C340,125 430,100 520,90 C570,86 620,83 660,80" fill="none" stroke="url(#tealLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "Without filtering" curve -->
  <path d="M100,195 C170,200 220,218 280,235 C340,252 430,268 520,278 C570,282 620,285 660,287" fill="none" stroke="url(#redLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Divergence annotation arrow -->
  <line x1="530" y1="90" x2="530" y2="278" stroke="#D1CEC7" stroke-width="0.8" stroke-dasharray="3,3"/>
  <polygon points="527,96 530,90 533,96" fill="#D1CEC7"/>
  <polygon points="527,272 530,278 533,272" fill="#D1CEC7"/>
  <rect x="505" y="174" width="50" height="20" rx="4" fill="#FAFAF7"/>
  <text x="530" y="188" text-anchor="middle" fill="#A1A1AA" font-size="9" font-weight="500">gap</text>

  <!-- Starting dot -->
  <circle cx="100" cy="195" r="4" fill="#52525B" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- End dots -->
  <circle cx="660" cy="80" r="4" fill="#2BA89E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="660" cy="287" r="4" fill="#EF4444" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Labels -->
  <rect x="543" y="62" width="112" height="22" rx="6" fill="#F0FDFA" stroke="#99F6E4" stroke-width="0.8"/>
  <text x="599" y="77" text-anchor="middle" fill="#1A7A70" font-size="10" font-weight="600">with filtering</text>

  <rect x="543" y="290" width="130" height="22" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.8"/>
  <text x="608" y="305" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600">without filtering</text>

  <!-- Annotation: what happens at the divergence point -->
  <text x="195" y="360" fill="#52525B" font-size="9">Both start equal.</text>
  <text x="195" y="373" fill="#52525B" font-size="9">Quality filtering determines the trajectory.</text>
</svg>
