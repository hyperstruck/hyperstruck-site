<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b2e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1017"/>
      <stop offset="100%" stop-color="#170d12"/>
    </linearGradient>
    <linearGradient id="goodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a17"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="1.5">LEARNING QUALITY COMPOUNDS</text>

  <!-- Divider line -->
  <line x1="360" y1="48" x2="360" y2="380" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT SIDE: Without quality filtering -->
  <text x="180" y="62" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600" letter-spacing="0.5">WITHOUT FILTERING</text>

  <!-- Task flow left -->
  <rect x="50" y="80" width="260" height="36" rx="5" fill="url(#boxGrad)" stroke="#334155" stroke-width="0.8"/>
  <text x="180" y="103" text-anchor="middle" fill="#cbd5e1" font-size="11">Task 1 extracts learnings</text>

  <!-- Arrow -->
  <line x1="180" y1="116" x2="180" y2="136" stroke="#475569" stroke-width="1"/>
  <polygon points="175,133 180,140 185,133" fill="#475569"/>

  <!-- Knowledge base (polluted) -->
  <rect x="50" y="140" width="260" height="100" rx="6" fill="url(#badGrad)" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="180" y="160" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">Knowledge Base</text>

  <rect x="65" y="170" width="230" height="18" rx="3" fill="#1f1215" stroke="#991b1b" stroke-width="0.5" opacity="0.7"/>
  <text x="80" y="183" fill="#f87171" font-size="9" font-style="italic">"bash can run commands"</text>

  <rect x="65" y="192" width="230" height="18" rx="3" fill="#1f1215" stroke="#991b1b" stroke-width="0.5" opacity="0.7"/>
  <text x="80" y="205" fill="#f87171" font-size="9" font-style="italic">"search_api finds information"</text>

  <rect x="65" y="214" width="230" height="18" rx="3" fill="#0f1a16" stroke="#065f46" stroke-width="0.5" opacity="0.4"/>
  <text x="80" y="227" fill="#6ee7b7" font-size="9" opacity="0.5" font-style="italic">"check X-Truncated header..."</text>
  <text x="270" y="227" fill="#64748b" font-size="8">buried</text>

  <!-- Arrow -->
  <line x1="180" y1="240" x2="180" y2="260" stroke="#475569" stroke-width="1"/>
  <polygon points="175,257 180,264 185,257" fill="#475569"/>

  <!-- Retrieval result -->
  <rect x="50" y="264" width="260" height="36" rx="5" fill="url(#badGrad)" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="180" y="282" text-anchor="middle" fill="#fca5a5" font-size="10">Task 10 retrieves: tautologies</text>
  <text x="180" y="294" text-anchor="middle" fill="#ef4444" font-size="9">Good learnings pushed down by noise</text>

  <!-- Arrow -->
  <line x1="180" y1="300" x2="180" y2="320" stroke="#475569" stroke-width="1"/>
  <polygon points="175,317 180,324 185,317" fill="#475569"/>

  <!-- Outcome left -->
  <rect x="50" y="324" width="260" height="48" rx="6" fill="url(#badGrad)" stroke="#991b1b" stroke-width="1"/>
  <text x="180" y="346" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Same mistakes repeated</text>
  <text x="180" y="362" text-anchor="middle" fill="#f87171" font-size="9.5">Agent doesn't improve with experience</text>

  <!-- RIGHT SIDE: With quality filtering -->
  <text x="540" y="62" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600" letter-spacing="0.5">WITH FILTERING</text>

  <!-- Task flow right -->
  <rect x="410" y="80" width="260" height="36" rx="5" fill="url(#boxGrad)" stroke="#334155" stroke-width="0.8"/>
  <text x="540" y="103" text-anchor="middle" fill="#cbd5e1" font-size="11">Task 1 extracts learnings</text>

  <!-- Arrow with filter indicator -->
  <line x1="540" y1="116" x2="540" y2="136" stroke="#475569" stroke-width="1"/>
  <polygon points="535,133 540,140 545,133" fill="#475569"/>
  <rect x="500" y="120" width="80" height="16" rx="3" fill="#1e3a5f" opacity="0.8"/>
  <text x="540" y="132" text-anchor="middle" fill="#7dd3fc" font-size="8" font-weight="500">quality gate</text>

  <!-- Knowledge base (clean) -->
  <rect x="410" y="140" width="260" height="100" rx="6" fill="url(#goodGrad)" stroke="#065f46" stroke-width="0.8"/>
  <text x="540" y="160" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">Knowledge Base</text>

  <rect x="425" y="170" width="230" height="18" rx="3" fill="#0f1a16" stroke="#065f46" stroke-width="0.5"/>
  <text x="440" y="183" fill="#6ee7b7" font-size="9" font-style="italic">"check X-Truncated header after export..."</text>

  <rect x="425" y="192" width="230" height="18" rx="3" fill="#0f1a16" stroke="#065f46" stroke-width="0.5"/>
  <text x="440" y="205" fill="#6ee7b7" font-size="9" font-style="italic">"UnicodeDecodeError? use ISO-8859-1..."</text>

  <rect x="425" y="214" width="230" height="18" rx="3" fill="#0f1a16" stroke="#065f46" stroke-width="0.5"/>
  <text x="440" y="227" fill="#6ee7b7" font-size="9" font-style="italic">"rate limit is 50 req/60s, use 1.5s delay"</text>

  <!-- Arrow -->
  <line x1="540" y1="240" x2="540" y2="260" stroke="#475569" stroke-width="1"/>
  <polygon points="535,257 540,264 545,257" fill="#475569"/>

  <!-- Retrieval result -->
  <rect x="410" y="264" width="260" height="36" rx="5" fill="url(#goodGrad)" stroke="#065f46" stroke-width="0.8"/>
  <text x="540" y="282" text-anchor="middle" fill="#6ee7b7" font-size="10">Task 10 retrieves: actionable insights</text>
  <text x="540" y="294" text-anchor="middle" fill="#22c55e" font-size="9">Every retrieval changes the plan</text>

  <!-- Arrow -->
  <line x1="540" y1="300" x2="540" y2="320" stroke="#475569" stroke-width="1"/>
  <polygon points="535,317 540,324 545,317" fill="#475569"/>

  <!-- Outcome right -->
  <rect x="410" y="324" width="260" height="48" rx="6" fill="url(#goodGrad)" stroke="#22c55e" stroke-width="1" filter="url(#glow)"/>
  <text x="540" y="346" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Measurably better over time</text>
  <text x="540" y="362" text-anchor="middle" fill="#4ade80" font-size="9.5">Each task benefits from all prior experience</text>
</svg>
