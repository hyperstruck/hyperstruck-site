<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F5F3EF"/>
    </linearGradient>
    <linearGradient id="tealLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2BA89E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2BA89E"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="tealFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2BA89E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2BA89E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="redFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="greyLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A1A1AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A1A1AA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="500" letter-spacing="2">CORPUS QUALITY OVER TIME</text>

  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="320" stroke="#D1CEC7" stroke-width="1"/>
  <line x1="80" y1="320" x2="660" y2="320" stroke="#D1CEC7" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="30" y="190" text-anchor="middle" fill="#A1A1AA" font-size="10" transform="rotate(-90, 30, 190)">KNOWLEDGE RELIABILITY</text>

  <!-- X-axis label -->
  <text x="370" y="348" text-anchor="middle" fill="#A1A1AA" font-size="10">LEARNINGS ACCUMULATED</text>

  <!-- Grid lines -->
  <line x1="80" y1="140" x2="660" y2="140" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="200" x2="660" y2="200" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="260" x2="660" y2="260" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Event marker: contradiction arrives -->
  <line x1="300" y1="65" x2="300" y2="315" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="300" y="75" text-anchor="middle" fill="#A1A1AA" font-size="9">contradiction</text>
  <text x="300" y="86" text-anchor="middle" fill="#A1A1AA" font-size="9">arrives</text>

  <!-- Event marker: policy change -->
  <line x1="460" y1="65" x2="460" y2="315" stroke="#E4E2DD" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="460" y="75" text-anchor="middle" fill="#A1A1AA" font-size="9">policy</text>
  <text x="460" y="86" text-anchor="middle" fill="#A1A1AA" font-size="9">change</text>

  <!-- Passive decay curve (red, declining after events) -->
  <!-- Starts high, stays high, then after contradiction degrades slowly, policy change degrades more -->
  <path d="M 80 120 C 140 118, 200 115, 260 115 C 280 115, 290 116, 300 118 C 340 135, 380 165, 420 180 C 440 188, 450 192, 460 196 C 500 220, 560 250, 640 270" fill="none" stroke="url(#redLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Passive decay fill area -->
  <path d="M 80 120 C 140 118, 200 115, 260 115 C 280 115, 290 116, 300 118 C 340 135, 380 165, 420 180 C 440 188, 450 192, 460 196 C 500 220, 560 250, 640 270 L 640 320 L 80 320 Z" fill="url(#redFill)" opacity="0.5"/>

  <!-- Active forgetting curve (teal, dips then recovers) -->
  <!-- Starts same, dips at contradiction but recovers quickly, dips at policy change but recovers -->
  <path d="M 80 120 C 140 118, 200 115, 260 115 C 280 115, 290 116, 300 130 C 320 120, 340 108, 380 100 C 420 92, 440 90, 460 108 C 480 98, 500 88, 540 82 C 580 78, 620 76, 640 75" fill="none" stroke="url(#tealLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Active forgetting fill area -->
  <path d="M 80 120 C 140 118, 200 115, 260 115 C 280 115, 290 116, 300 130 C 320 120, 340 108, 380 100 C 420 92, 440 90, 460 108 C 480 98, 500 88, 540 82 C 580 78, 620 76, 640 75 L 640 320 L 80 320 Z" fill="url(#tealFill)" opacity="0.5"/>

  <!-- Legend -->
  <rect x="480" y="360" width="16" height="3" rx="1.5" fill="#2BA89E"/>
  <text x="502" y="364" fill="#52525B" font-size="10">Active forgetting</text>

  <rect x="480" y="376" width="16" height="3" rx="1.5" fill="#EF4444"/>
  <text x="502" y="380" fill="#52525B" font-size="10">Passive decay</text>

  <!-- Annotation: dip and recovery -->
  <circle cx="300" cy="130" r="3" fill="#2BA89E" opacity="0.6"/>
  <circle cx="300" cy="118" r="3" fill="#EF4444" opacity="0.6"/>

  <circle cx="460" cy="108" r="3" fill="#2BA89E" opacity="0.6"/>
  <circle cx="460" cy="196" r="3" fill="#EF4444" opacity="0.6"/>
</svg>
